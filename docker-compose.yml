services:
  db:
    image: postgres:15-alpine
    container_name: amnezia-panel-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME:-amnezia}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-amnezia}
      POSTGRES_DB: ${DB_DATABASE:-amnezia_panel}
      POSTGRES_MULTIPLE_DATABASES: "amnezia_panel,telegram_bot"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:z
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amnezia-panel-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      dind:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-local}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-en}
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-amnezia_panel}
      DB_USERNAME: ${DB_USERNAME:-amnezia}
      DB_PASSWORD: ${DB_PASSWORD:-amnezia}
      DOCKER_HOST: tcp://dind:2375
    volumes:
      - ./:/var/www/html:z
    ports:
      - "8082:80"

  dind:
    image: docker:24-dind
    container_name: amnezia-panel-dind
    privileged: true
    restart: unless-stopped
    environment:
      DOCKER_TLS_CERTDIR: ""
    command: ["dockerd", "--host=tcp://0.0.0.0:2375", "--host=unix:///var/run/docker.sock", "--tls=false", "--dns=8.8.8.8", "--dns=1.1.1.1", "--mtu=1200"]
    volumes:
      - dind_data:/var/lib/docker

  telegram_bot:
    build:
      context: ./telegram_bot
      dockerfile: Dockerfile
    container_name: amnezia-panel-telegram-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started
    env_file:
      - .env
    environment:
      TG_DB_HOST: db
      TG_DB_PORT: 5432
      TG_DB_NAME: telegram_bot
      TG_DB_USER: ${DB_USERNAME:-amnezia}
      TG_DB_PASSWORD: ${DB_PASSWORD:-amnezia}
      PANEL_API_URL: ${PANEL_API_URL:-http://web:80}
    volumes:
      - logs:/app/logs
    ports:
      - "${BOT_WEBHOOK_PORT:-8080}:${BOT_WEBHOOK_PORT:-8080}"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: awghook-cloudflared
    network_mode: "host"
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN}

volumes:
  pg_data:
  dind_data:
  logs:
